<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .title { font: bold 28px sans-serif; }
    .label { font: 18px sans-serif; }
    .small { font: 15px sans-serif; }
    .state { fill: #f0fdf4; stroke: #166534; stroke-width: 3; rx: 18; ry: 18; }
    .line { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
  <text x="40" y="50" class="title">State transition diagram - PointBucket lifecycle</text>

  <circle cx="70" cy="220" r="18" fill="#111827" />
  <line x1="88" y1="220" x2="190" y2="220" class="line" />
  <text x="105" y="195" class="small">earn points</text>

  <rect x="190" y="175" width="220" height="90" class="state" />
  <text x="250" y="225" class="label">Active</text>

  <rect x="490" y="175" width="240" height="90" class="state" />
  <text x="540" y="215" class="label">Active after</text>
  <text x="548" y="240" class="label">partial spend</text>

  <rect x="840" y="175" width="200" height="90" class="state" />
  <text x="900" y="225" class="label">Depleted</text>

  <rect x="490" y="470" width="240" height="90" class="state" />
  <text x="560" y="520" class="label">Expired</text>

  <line x1="410" y1="220" x2="490" y2="220" class="line" />
  <text x="430" y="190" class="small">partial spend</text>

  <line x1="730" y1="220" x2="840" y2="220" class="line" />
  <text x="742" y="190" class="small">remaining points = 0</text>

  <path d="M610 265 L610 470" class="line" />
  <text x="635" y="350" class="small">expiration date reached</text>
  <text x="635" y="372" class="small">with remaining points &gt; 0</text>

  <line x1="1040" y1="220" x2="1110" y2="220" class="line" />
  <circle cx="1130" cy="220" r="20" stroke="#111827" stroke-width="3" fill="white" />
  <circle cx="1130" cy="220" r="12" fill="#111827" />

  <line x1="610" y1="560" x2="610" y2="620" class="line" />
  <circle cx="610" cy="640" r="20" stroke="#111827" stroke-width="3" fill="white" />
  <circle cx="610" cy="640" r="12" fill="#111827" />
</svg>