<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>
    .title { font: bold 28px sans-serif; }
    .label { font: 18px sans-serif; }
    .small { font: 16px sans-serif; }
    .ellipse { fill: #f8fbff; stroke: #1e3a8a; stroke-width: 3; }
    .line { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
    .actor { stroke: #111827; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
  <text x="40" y="50" class="title">Use case diagram - Carrefour Loyalty Kata</text>

  <circle cx="120" cy="250" r="25" class="actor" />
  <line x1="120" y1="275" x2="120" y2="360" class="actor" />
  <line x1="75" y1="310" x2="165" y2="310" class="actor" />
  <line x1="120" y1="360" x2="80" y2="430" class="actor" />
  <line x1="120" y1="360" x2="160" y2="430" class="actor" />
  <text x="75" y="470" class="label">Customer</text>

  <line x1="180" y1="310" x2="370" y2="160" class="line" />
  <line x1="180" y1="310" x2="770" y2="160" class="line" />
  <line x1="180" y1="310" x2="370" y2="350" class="line" />
  <line x1="180" y1="310" x2="770" y2="350" class="line" />
  <line x1="180" y1="310" x2="370" y2="560" class="line" />
  <line x1="180" y1="310" x2="770" y2="560" class="line" />
  <line x1="180" y1="310" x2="570" y2="760" class="line" />

  <ellipse cx="500" cy="160" rx="130" ry="45" class="ellipse" />
  <text x="428" y="155" class="label">Earn points</text>
  <text x="407" y="178" class="small">from purchase</text>

  <ellipse cx="900" cy="160" rx="140" ry="45" class="ellipse" />
  <text x="812" y="155" class="label">Spend points</text>
  <text x="838" y="178" class="small">as payment</text>

  <ellipse cx="500" cy="350" rx="145" ry="45" class="ellipse" />
  <text x="400" y="345" class="label">Convert points</text>
  <text x="425" y="368" class="small">into voucher</text>

  <ellipse cx="900" cy="350" rx="145" ry="45" class="ellipse" />
  <text x="816" y="345" class="label">Donate points</text>
  <text x="838" y="368" class="small">to charity</text>

  <ellipse cx="500" cy="560" rx="150" ry="45" class="ellipse" />
  <text x="410" y="555" class="label">Check available</text>
  <text x="450" y="578" class="small">balance</text>

  <ellipse cx="900" cy="560" rx="150" ry="45" class="ellipse" />
  <text x="805" y="555" class="label">Check points</text>
  <text x="815" y="578" class="small">expiring soon</text>

  <ellipse cx="700" cy="760" rx="150" ry="45" class="ellipse" />
  <text x="630" y="755" class="label">Expire outdated</text>
  <text x="677" y="778" class="small">points</text>
</svg>